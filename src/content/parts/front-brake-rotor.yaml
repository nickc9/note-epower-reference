  Dixcel number covers all). Minimum (wear-limit) thickness 20 mm from a
  nominal 22 mm. Genuine number 40206-3U80A confirmed via the Amayama
  genuine catalogue (Note + HR12DE fitment — the fitment table doesn't
  distinguish petrol E12 from e-POWER HE12, but the Dixcel evidence shows
  the whole family shares one rotor). Sold per rotor — order two. A
  different candidate, 40206-EG000, circulates online: it's a 350Z/370Z/
  Murano rotor, wrong for this car.
