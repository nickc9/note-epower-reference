notes: >-
  Amayama's genuine catalogue lists the Note (and HR12DE) in this drum's
  fitment, which resolves an earlier conflict: a second candidate number
  (43206-3HA2A) exists in the genuine catalogue but shows no fitment data at
  all. If ordering genuine, quote your frame number (HE12-xxxxxx) to the
  vendor to be certain. Drums rarely need replacement — shoes wear first.
  Re-checked later: retailer listings (YoshiParts, JDM Yamato) sell
  43206-3HA2A specifically as a "Note E12" part, which briefly looked like
  it might be the more specific/correct number — but a direct Amayama
  browser check (July 2026) confirms 43206-3HA2A still shows zero genuine
  fitment data, same as before, while ED300's Amayama fitment table
  explicitly includes the Note. ED300 remains the better-sourced number.
