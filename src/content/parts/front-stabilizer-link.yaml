notes: >-
  The classic knocking-over-bumps wear part — one link fits left and right,
  order two. The NISMO/NISMO S front stabilizer BAR itself is factory-uprated
  ("フロント強化" per Nissan's own spec sheet) and its bar part number is
  still unconfirmed, but no source suggests the LINKS differ by grade —
  retailer fitment lists cover all HE12 grades. Upper and lower nuts
  39 N·m (third-party torque table, not factory-verified).
