notes: >-
  Evidence conflicts on the correct genuine number for this car. JP specialty
  retailers explicitly label **40210-5RB0A** as the current HE12 number
  (Nov 2016 on) and **40210-1HA1A** as the earlier pre-facelift number
  (Sept 2012-Oct 2016, i.e. before the e-POWER existed) — both cross-reference
  to the same aftermarket kit, WBH-222N. But Amayama's own genuine-catalogue
  fitment table says the opposite: 40210-5RB0A's fitment list shows ONLY
  Nissan Kicks (HR16DE) with no Note at all, while 40210-1HA1A's fitment list
  explicitly includes Nissan Note under engine HR12DE (the e-POWER generator
  code), with no date cutoff or supersession notice shown. Until this is
  resolved — ideally via a dealer parts lookup against your own frame number,
  or by reading the number stamped on the bearing you're replacing — treat
  this as an open question rather than ordering blind. Whichever number is
  correct, no source gives a distinct NISMO/NISMO S part; front brake type and
  wheel spec are already confirmed identical across all HE12 grades (see the
  suspension reference guide), so the bearing is likely shared too, but this
  is inference, not a confirmed fitment hit. The ABS wheel-speed sensor is
  probably integrated into the hub bearing unit, as is standard on modern
  Nissans with front discs, though no source names this explicitly for either
  candidate number. Real owner-reported failures exist (speed-dependent
  roaring/humming, sometimes detectable play) spanning roughly 36,000 km to
  over 140,000 km — a genuine issue, but not a tight "100,000 km" cluster;
  don't wait for a mileage milestone, inspect if you hear the noise. This is
  a press/knuckle-removal job, not a simple hand-tool swap — budget for a
  professional or an at-home hydraulic press, plus new one-time-use hub
  fasteners.
