notes: >-
  This is the base mirror HOUSING assembly (motor, fold mechanism, glass,
  turn-signal lamp, blind-spot camera bracket) — the carbon cover sold as a
  NISMO accessory is a separate part, see door-mirror-cover. Amayama's own
  fitment table confirms HR12DE among the listed engines, which is the
  e-POWER generator engine code, so this is not a petrol-only part. Nissan's
  numbering scheme has many 96301-xxxxx siblings differing by paint color and
  equipment level (heated glass, camera, turn signal) — 5VA0C/5VA0D
  (RH/LH pair) is the one directly confirmed by Amayama for this platform;
  a different color code will have a different suffix. Landed price via
  Amayama (~AU$1,400 incl. import/GST) is much higher than a JPY retail
  price would suggest — get a JPY quote from a JDM parts reseller before
  assuming the Amayama price is representative.
