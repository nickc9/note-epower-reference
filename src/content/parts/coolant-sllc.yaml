notes: >-
  Used in BOTH of the e-POWER's separate cooling circuits: engine (~6.78 L)
  and inverter (~4.16 L). Nissan's FAQ says genuine S-LLC only, and no
  leak-stop additives. Premixed 50% — do not dilute further. Interval:
  first change 7 yr / 160,000 km, then every 4 yr / 80,000 km. See the
  cooling system guide before attempting a DIY change — the inverter
  circuit has an electric pump and no publicly documented bleed procedure.
