notes: >-
  The e-POWER has no CVT and no transmission — the EM57 motor drives the
  wheels through a single-speed reduction gear holding ~1.94 L of Nissan
  Matic Fluid S. The fluid NAME is solid (4 independent owner logs agree);
  KLE27-00002 is the only genuine product code found and only comes as a
  20 L pail, so in practice you buy ~2 L dispensed at a dealer/shop
  (owner-reported dealer job cost ¥6,000-9,000 all-in) or use Aisin AFW+.
  Do NOT use CVT fluid (NS-2/NS-3) — that's the petrol Note. Nissan
  publishes no change interval; see the guide for what owner teardowns
  found. Price shown is the ~2 L fluid portion of a shop job, not the pail.
