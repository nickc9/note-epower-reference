notes: >-
  The e-POWER uses a European EN/DIN (LN) format battery, NOT a JIS size —
  unlike petrol E12 Notes. The LN2 fitment class for non-S grades is verified
  (Nissan FAQ + Panasonic chart agree); the genuine Nissan part number itself
  is 24410-0542R at "probable" confidence: an owner's factory battery is
  stamped with it and an independent retailer cross-references it, but it's
  not in Amayama's JDM Nissan catalogue (checked July 2026) and the same
  number appears in Renault-alliance catalogues — likely an alliance-shared
  number rather than a JDM catalogue one. In practice order any LN2 EFB
  below rather than chasing the genuine part. Use an EFB /
  idling-stop-rated battery — standard flooded types are not suited to
  e-POWER charge cycling. Located under the boot floor with a hydrogen vent
  hose that MUST be reconnected — see the replacement guide. One retailer
  lists LN1 for "Nismo S" — this appears to confuse the base "e-POWER S"
  grade with "NISMO S"; the weight of catalogue evidence says NISMO/NISMO S
  take LN2. Check the label on your installed battery before ordering.
