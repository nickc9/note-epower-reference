notes: >-
  The closest thing to a factory suspension upgrade for this car — NISMO's
  own Öhlins-based full-length adjustable kit, fitted via NISMO Omori
  Factory / Performance Centers. NISMO's current live grade-applicability
  table confirms 53110-RPE21 covers the e-POWER NISMO and e-POWER NISMO S
  specifically (not just the petrol car) — the earlier "Note E12 NISMO S"
  catalogue-row ambiguity is resolved. Current price ¥452,500 excl. tax /
  ¥497,750 incl., vs ¥371,000 excl. tax quoted at the 2020 launch — this
  may be a genuine price rise since 2020, or the 2020 figure may have been
  introductory; the historical Wayback Machine snapshot needed to date
  that precisely wasn't reachable during research, so treat ¥452,500 as
  "as of July 2026" rather than a fixed number. Confirm with a NISMO
  dealer before budgeting. Note: NISMO's separate "S-tune suspension kit"
  product line does NOT cover the Note at all, despite what the name
  suggests.
