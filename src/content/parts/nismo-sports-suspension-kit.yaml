notes: >-
  The closest thing to a factory suspension upgrade for this car — NISMO's
  own Öhlins-based full-length adjustable kit, fitted via NISMO Omori
  Factory / Performance Centers. Two official NISMO sources confirm it
  exists for the e-POWER NISMO/NISMO S; what's murky is the current price
  and SKU (¥371,000 excl. tax in the 2020 launch release vs ¥452,500
  excl. tax in the current catalogue, whose row only says "Note E12
  NISMO S") — confirm both with a NISMO dealer before budgeting. Note:
  NISMO's separate "S-tune suspension kit" product line does NOT cover
  the Note at all, despite what the name suggests.
